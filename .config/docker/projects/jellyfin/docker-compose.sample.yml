name: "jellyfin"

services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    # Optional - specify the uid and gid you would like Jellyfin to use instead of root
    user: ${PUID}:${PGID}
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - type: bind
        source: ${VOLUME_DATA_DIR}/jellyfin/config
        target: /config
        read_only: false
      - type: bind
        source: ${VOLUME_DATA_DIR}/jellyfin/cache
        target: /cache
        read_only: false
      - type: bind
        source: ${VOLUME_DATA_DIR}/jellyfin/media
        target: /media
      - type: bind
        source: ${VOLUME_DATA_DIR}/jellyfin/media2
        target: /media2
        read_only: true
      # Optional - extra fonts to be used during transcoding with subtitle burn-in
      - type: bind
        source: ${VOLUME_DATA_DIR}/jellyfin/fonts
        target: /usr/local/share/fonts/custom
        read_only: false
    restart: 'unless-stopped'
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "jellyfin"
      tsdproxy.container_port: 8096
