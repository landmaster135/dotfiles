name: 'filebrowser'

services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    ports:
      - "8180:80"
    volumes:
      - type: bind
        source: ${VOLUME_DATA_DIR}/filebrowser/srv
        target: /srv
        read_only: false
      - type: bind
        source: ${VOLUME_DATA_DIR}/filebrowser/database
        target: /database
        read_only: false
      - type: bind
        source: ${VOLUME_DATA_DIR}/filebrowser/config
        target: /config
        read_only: false
      # /mnt/hdd01を/srv/hdd01にマウント
      - type: bind
        source: /mnt/hdd01
        target: /srv/hdd01
        read_only: false
      - type: bind
        source: /mnt/hdd02
        target: /srv/hdd02
        read_only: false
      - type: bind
        source: /mnt/hdd03
        target: /srv/hdd03
        read_only: false
      - type: bind
        source: /mnt/hdd04
        target: /srv/hdd04
        read_only: false
    environment:
      - TZ=${TZ}
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "filebrowser"
      tsdproxy.container_port: 8180
