# =============================================================================
# daily_alarm_summary.conf
# 日次アラーム集計通知と失敗検知
# =============================================================================

alarm: daily_alarm_summary_report
  on: custom.daily_alarm_summary_report
  lookup: max -2m unaligned of report_trigger
  units: runs
  every: 30s
  warn: $this > 0
  delay: down 2m multiplier 1 max 10m
  summary: Daily alarm summary report generated
  info: 直近24時間のアラーム集計レポートを生成しました（to: daily_report）
  to: daily_report

alarm: daily_alarm_summary_failed
  on: custom.daily_alarm_summary_status
  lookup: max -5m unaligned of summary_failed
  units: status
  every: 30s
  warn: $this > 0
  delay: down 10m multiplier 1.5 max 1h
  summary: Daily alarm summary generation failed
  info: 指定時刻を過ぎても日次集計レポートが生成できていません。プラグイン/API到達性を確認してください。
  to: sysadmin
