# =============================================================================
# cpu_pressure_guard.conf
# CPU Pressure Stall Information 監視アラート設定
# =============================================================================

alarm: cpu_some_pressure_high
  on: system.cpu_some_pressure
  class: Saturation
  type: System
  component: CPU
  lookup: average -6h unaligned of some10
  units: %
  every: 10m
  warn: $this > 5
  crit: $this > 8
  delay: down 15m multiplier 1.2 max 1h
  summary: CPU some pressure high detected
  info: 6時間平均の CPU some pressure が閾値を超過しました（some10: ${this}%）
  to: sysadmin

alarm: cpu_some_pressure_stall_time_high
  on: system.cpu_some_pressure_stall_time
  class: Latency
  type: System
  component: CPU
  lookup: average -6h unaligned of time
  units: ms
  every: 10m
  warn: $this > 50
  crit: $this > 80
  delay: down 15m multiplier 1.2 max 1h
  summary: CPU some pressure stall time high detected
  info: 6時間平均の CPU some pressure stall time が閾値を超過しました（time: ${this}ms）
  to: sysadmin

alarm: cpu_some_pressure_elevated_midterm
  on: system.cpu_some_pressure
  class: Saturation
  type: System
  component: CPU
  lookup: average -30m unaligned of some10
  units: %
  every: 1m
  warn: $this > 5
  crit: $this > 10
  delay: down 10m multiplier 1.2 max 1h
  summary: CPU some pressure elevated midterm detected
  info: 30分平均の CPU some pressure が閾値を超過しました（some10: ${this}%）
  to: sysadmin

alarm: cpu_some_pressure_stall_time_spike
  on: system.cpu_some_pressure_stall_time
  class: Latency
  type: System
  component: CPU
  lookup: max -10m unaligned of time
  units: ms
  every: 1m
  warn: $this > 50
  crit: $this > 100
  delay: down 5m multiplier 1.2 max 30m
  summary: CPU some pressure stall time spike detected
  info: 直近10分の CPU some pressure stall time 最大値が閾値を超過しました（time: ${this}ms）
  to: sysadmin
