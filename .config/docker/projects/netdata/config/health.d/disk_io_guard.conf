# =============================================================================
# disk_io_guard.conf
# Disk I/O しきい値監視アラート設定
# =============================================================================

alarm: disk_latency_attention
  on: custom.disk_io_guard_status
  lookup: max -30s unaligned of latency_attention_count
  units: devices
  every: 10s
  warn: $this > 0
  delay: down 5m multiplier 1.5 max 30m
  summary: Disk I/O latency attention detected
  info: SSD/HDD の I/O レイテンシが設定値を超過したデバイスがあります（対象数: ${this}）
  to: sysadmin

alarm: disk_ops_spike_attention
  on: custom.disk_io_guard_status
  lookup: max -30s unaligned of ops_spike_attention_count
  units: devices
  every: 10s
  warn: $this > 0
  delay: down 5m multiplier 1.5 max 30m
  summary: Disk I/O ops spike attention detected
  info: 平常平均の3倍超となった I/O Operations を検知しました（対象数: ${this}）
  to: sysadmin

alarm: disk_ops_absolute_attention
  on: custom.disk_io_guard_status
  lookup: max -30s unaligned of ops_absolute_attention_count
  units: devices
  every: 10s
  warn: $this > 0
  delay: down 5m multiplier 1.5 max 30m
  summary: Disk I/O ops absolute attention detected
  info: 1000 ops/s 超の I/O Operations を検知しました（対象数: ${this}）
  to: sysadmin

alarm: disk_util_attention
