template: disk_ops_baseline
  on: disk.ops
  lookup: average -5m at -10m unaligned of reads,writes
  calc: $this
  units: ops/s
  every: 1m
  info: 過去帯域の平均 I/O Operations を保持する内部指標
  to: silent

template: disk_ops_spike_attention
  on: disk.ops
  class: Throughput
  type: System
  component: Disk
  lookup: average -1m unaligned of reads,writes
  calc: ($disk_ops_baseline > 0) ? ($this / $disk_ops_baseline) : 1
  units: x
  every: 1m
  warn: $this > 3
  delay: down 10m multiplier 1.2 max 1h
  summary: Disk ${label:device} ops spike attention detected
  info: disk.ops 合算値が通常帯域の3倍を超過しました（device: ${label:device}, 倍率: ${this}x）
  to: sysadmin

template: disk_ops_absolute_attention
  on: disk.ops
  class: Throughput
  type: System
  component: Disk
  lookup: average -1m unaligned of reads,writes
  units: ops/s
  every: 1m
  warn: $this > 1000
  delay: down 10m multiplier 1.2 max 1h
  summary: Disk ${label:device} ops absolute attention detected
  info: disk.ops 合算値が 1000 ops/s を超過しました（device: ${label:device}, 値: ${this}）
  to: sysadmin

template: disk_util_attention
  on: disk.util
  class: Utilization
  type: System
  component: Disk
  lookup: average -10m unaligned
  units: %
  every: 1m
  warn: $this > 85
  delay: down 15m multiplier 1.2 max 1h
  summary: Disk ${label:device} utilization attention detected
  info: 10分平均 disk.util が 85% を超過しました（device: ${label:device}, 値: ${this}%）
  to: sysadmin

template: disk_util_critical
  on: disk.util
  class: Utilization
  type: System
  component: Disk
  lookup: average -10m unaligned
  units: %
  every: 1m
  crit: $this > 98
  delay: down 15m multiplier 1.2 max 1h
  summary: Disk ${label:device} utilization critical detected
  info: 10分平均 disk.util が 98% を超過しました（device: ${label:device}, 値: ${this}%）
  to: sysadmin

