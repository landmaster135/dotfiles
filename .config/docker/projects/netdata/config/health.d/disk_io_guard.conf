  delay: down 5m multiplier 1.5 max 30m
  summary: Disk utilization attention detected
  info: 10秒平均 Disk Utilization が 85% を超過しました（対象数: ${this}）
  to: sysadmin

alarm: disk_util_critical
  on: custom.disk_io_guard_status
  lookup: max -30s unaligned of util_critical_count
  units: devices
  every: 10s
  crit: $this > 0
  delay: down 5m multiplier 1.5 max 30m
  summary: Disk utilization critical detected
  info: 1分平均 Disk Utilization が 98% を超過しました（対象数: ${this}）
  to: sysadmin

alarm: disk_backlog_attention
