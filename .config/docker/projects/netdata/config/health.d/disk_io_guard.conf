# =============================================================================
# disk_io_guard.conf
# Disk I/O しきい値監視アラート設定
# =============================================================================

template: disk_latency_read_attention_ssd
  on: disk.await
  chart labels: device=nvme* mmcblk*
  class: Latency
  type: System
  component: Disk
  lookup: average -1m unaligned of reads
  units: ms/op
  every: 1m
  warn: $this > 20
  delay: down 10m multiplier 1.2 max 1h
  summary: SSD disk ${label:device} read latency attention detected
  info: 1分平均 disk.await reads が 20ms/op を超過しました SSD device ${label:device} 値 ${this}
  to: sysadmin

