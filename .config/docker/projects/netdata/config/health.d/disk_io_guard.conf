template: disk_space_attention
  on: disk.space
  class: Utilization
  type: System
  component: Disk
  chart labels: mount_point=!/dev !/dev/* !/run !/run/* !HarddiskVolume* *
  calc: $used * 100 / ($avail + $used)
  units: %
  every: 1m
  warn: $this > 85
  delay: down 15m multiplier 1.2 max 1h
  summary: Disk ${label:mount_point} space attention detected
  info: Disk usage exceeded 85 percent mount ${label:mount_point} value ${this}%
  to: sysadmin

template: disk_space_critical
  on: disk.space
  class: Utilization
  type: System
  component: Disk
  chart labels: mount_point=!/dev !/dev/* !/run !/run/* !HarddiskVolume* *
  calc: $used * 100 / ($avail + $used)
  units: %
  every: 1m
  crit: $this > 90
  delay: down 15m multiplier 1.2 max 1h
  summary: Disk ${label:mount_point} space critical detected
  info: Disk usage exceeded 90 percent mount ${label:mount_point} value ${this}%
  to: sysadmin
