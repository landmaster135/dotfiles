# =============================================================================
# disk_io_guard.conf
# Disk I/O しきい値監視アラート設定
# =============================================================================

alarm: disk_latency_attention
  on: custom.disk_io_guard_status
  lookup: max -30s unaligned of latency_attention_count
  units: devices
  every: 10s
  warn: $this > 0
  delay: down 5m multiplier 1.5 max 30m
  summary: Disk I/O latency attention detected
  info: SSD/HDD の I/O レイテンシが設定値を超過したデバイスがあります（対象数: ${this}）
  to: sysadmin

alarm: disk_ops_spike_attention
  on: custom.disk_io_guard_status
  lookup: max -30s unaligned of ops_spike_attention_count
  units: devices
  every: 10s
  warn: $this > 0
  delay: down 5m multiplier 1.5 max 30m
  summary: Disk I/O ops spike attention detected
  info: 平常平均の3倍超となった I/O Operations を検知しました（対象数: ${this}）
  to: sysadmin

alarm: disk_ops_absolute_attention
  on: custom.disk_io_guard_status
  lookup: max -30s unaligned of ops_absolute_attention_count
  units: devices
  every: 10s
  warn: $this > 0
  delay: down 5m multiplier 1.5 max 30m
  summary: Disk I/O ops absolute attention detected
  info: 1000 ops/s 超の I/O Operations を検知しました（対象数: ${this}）
  to: sysadmin

template: disk_util_attention
  on: disk.util
  class: Utilization
  type: System
  component: Disk
  lookup: average -10m unaligned
  units: %
  every: 1m
  warn: $this > 85
  delay: down 15m multiplier 1.2 max 1h
  summary: Disk ${label:device} utilization attention detected
  info: 10分平均 disk.util が 85% を超過しました（device: ${label:device}, 値: ${this}%）
  to: sysadmin

template: disk_util_critical
  on: disk.util
  class: Utilization
  type: System
  component: Disk
  lookup: average -10m unaligned
  units: %
  every: 1m
  crit: $this > 98
  delay: down 15m multiplier 1.2 max 1h
  summary: Disk ${label:device} utilization critical detected
  info: 10分平均 disk.util が 98% を超過しました（device: ${label:device}, 値: ${this}%）
  to: sysadmin

template: disk_backlog_attention
  on: disk.backlog
  class: Latency
  type: System
  component: Disk
  lookup: average -10m unaligned
  units: ms
  every: 1m
  warn: $this > 1000
  delay: down 15m multiplier 1.2 max 1h
  summary: Disk ${label:device} backlog attention detected
  info: 10分平均 disk.backlog が 1000ms を超過しました（device: ${label:device}, 値: ${this}ms）
  to: sysadmin

template: disk_backlog_critical
  on: disk.backlog
  class: Latency
  type: System
  component: Disk
  lookup: average -10m unaligned
  units: ms
  every: 1m
  crit: $this > 5000
  delay: down 15m multiplier 1.2 max 1h
  summary: Disk ${label:device} backlog critical detected
  info: 10分平均 disk.backlog が 5000ms を超過しました（device: ${label:device}, 値: ${this}ms）
  to: sysadmin

alarm: disk_space_attention
  on: custom.disk_io_guard_status
  lookup: max -30s unaligned of space_attention_status_count
  units: mounts
  every: 10s
  warn: $this > 0
  delay: down 5m multiplier 1.5 max 30m
  summary: Disk space attention detected
  info: 使用率 85% 以上のマウントポイントを検知しました（対象数: ${this}）
  to: sysadmin

alarm: disk_space_critical
  on: custom.disk_io_guard_status
  lookup: max -30s unaligned of space_critical_status_count
  units: mounts
  every: 10s
  crit: $this > 0
  delay: down 5m multiplier 1.5 max 30m
  summary: Disk space critical detected
  info: 使用率 90% 以上のマウントポイントを検知しました（対象数: ${this}）
  to: sysadmin
