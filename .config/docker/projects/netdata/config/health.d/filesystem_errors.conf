# =============================================================================
# filesystem_errors.conf
# ファイルシステムエラー検知アラート設定
#
# 配置先: /etc/netdata/health.d/filesystem_errors.conf
# =============================================================================

# -----------------------------------------------------------------------------
# EXT4 エラー検知
# -----------------------------------------------------------------------------
alarm: ext4_error_detected
    on: custom.filesystem_errors
    lookup: sum -5m unaligned of ext4_errors
    units: errors
    every: 30s
    warn: $this > 0
    crit: $this > 5
    delay: down 10m multiplier 1.5 max 1h
    summary: EXT4 filesystem error detected
    info: EXT4ファイルシステムエラーがカーネルログで検知されました（直近5分間: ${this}件）
    to: sysadmin

# -----------------------------------------------------------------------------
# XFS エラー検知
# -----------------------------------------------------------------------------
alarm: xfs_error_detected
    on: custom.filesystem_errors
    lookup: sum -5m unaligned of xfs_errors
    units: errors
    every: 30s
    warn: $this > 0
    crit: $this > 5
    delay: down 10m multiplier 1.5 max 1h
    summary: XFS filesystem error detected
    info: XFSファイルシステムエラーがカーネルログで検知されました（直近5分間: ${this}件）
    to: sysadmin

# -----------------------------------------------------------------------------
# Btrfs エラー検知
# -----------------------------------------------------------------------------
alarm: btrfs_error_detected
    on: custom.filesystem_errors
    lookup: sum -5m unaligned of btrfs_errors
    units: errors
    every: 30s
    warn: $this > 0
    crit: $this > 5
    delay: down 10m multiplier 1.5 max 1h
    summary: Btrfs filesystem error detected
    info: Btrfsファイルシステムエラーがカーネルログで検知されました（直近5分間: ${this}件）
    to: sysadmin

# -----------------------------------------------------------------------------
# その他のI/Oエラー (Buffer I/O error, SCSI error など)
# -----------------------------------------------------------------------------
alarm: disk_io_error_detected
    on: custom.filesystem_errors
    lookup: sum -5m unaligned of other_errors
    units: errors
    every: 30s
    warn: $this > 0
    crit: $this > 10
    delay: down 10m multiplier 1.5 max 1h
    summary: Disk I/O error detected
    info: ディスクI/Oエラーがカーネルログで検知されました（直近5分間: ${this}件）
    to: sysadmin

# -----------------------------------------------------------------------------
# 全ファイルシステムエラーの合計 (総合アラート)
# -----------------------------------------------------------------------------
alarm: filesystem_total_errors
    on: custom.filesystem_errors
    lookup: sum -5m unaligned of ext4_errors,xfs_errors,btrfs_errors,other_errors
    units: errors
    every: 30s
    warn: $this > 0
    crit: $this > 20
    delay: down 10m multiplier 1.5 max 1h
    summary: Multiple filesystem errors detected
    info: 複数種のファイルシステムエラーがカーネルログで検知されました（直近5分間合計: ${this}件）
    to: sysadmin
