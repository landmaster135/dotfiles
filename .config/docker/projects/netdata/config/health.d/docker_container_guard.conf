# =============================================================================
# docker_container_guard.conf
# Docker コンテナ停止時間監視アラート設定
# =============================================================================

template: docker_stopped_containers_over_1h
  on: docker.containers_state
  class: Availability
  type: System
  component: Docker
  lookup: min -1h unaligned of stopped
  units: containers
  every: 1m
  warn: $this > 0
  delay: down 10m multiplier 1.2 max 1h
  summary: Docker stopped containers over 1 hour detected
  info: 直近1時間ずっと stopped コンテナ数が 1 以上です（stopped: ${this}）
  to: sysadmin
