# =============================================================================
# memory_guard.conf
# Memory しきい値監視アラート設定
# =============================================================================

alarm: ram_usage
  on: system.ram
  class: Utilization
  type: System
  component: Memory
  lookup: average -5m unaligned
  calc: $used * 100 / ($used + $cached + $free + $buffers)
  units: %
  every: 1m
  warn: $this > 80
  crit: $this > 90
  delay: down 15m multiplier 1.2 max 1h
  summary: RAM usage attention or critical detected
  info: 5分平均の RAM 使用率が ${this}% です（warn: 80%, crit: 90%）
  to: sysadmin

alarm: swap_usage
  on: system.swap
  class: Utilization
  type: System
  component: Memory
  lookup: average -10m unaligned
  calc: $used * 100 / ($used + $free)
  units: %
  every: 1m
  warn: $this > 30
  crit: $this > 70
  delay: down 15m multiplier 1.2 max 1h
  summary: Swap usage attention or critical detected
  info: 10分平均の swap 使用率が ${this}% です（warn: 30%, crit: 70%）
  to: sysadmin

alarm: swap_activity
  on: mem.swapio
  class: Throughput
  type: System
  component: Memory
  lookup: average -1m unaligned of out
  units: KB/s
  every: 1m
  warn: $this > 1024
  crit: $this > 4096
  delay: down 10m multiplier 1.2 max 1h
  summary: Swap activity attention or critical detected
  info: 1分平均の swap out が ${this}KB/s です（warn: 1024 KB/s, crit: 4096 KB/s）
  to: sysadmin
