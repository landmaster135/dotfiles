services:
  tailscale:
    container_name: tailscale
    image: tailscale/tailscale:latest
    restart: always
    volumes:
      - type: bind
        source: ${VOLUME_DATA_DIR}/tailscale/tun
        target: /dev/net/tun
        read_only: false
      - type: bind
        source: ${VOLUME_DATA_DIR}/tailscale/lib
        target: /var/lib
        read_only: false
    environment:
      - TS_AUTH_KEY=${TS_AUTH_KEY}
      - TS_STATE_DIR=${TS_STATE_DIR}
      - TS_ROUTES=${TS_ROUTES}
    network_mode: host
    privileged: true
