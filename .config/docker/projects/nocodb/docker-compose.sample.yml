name: "nocodb"

services:
  nocodb:
    depends_on:
      root_db:
        condition: service_healthy
    environment:
      NC_DB: "pg://root_db:5432?u=${POSTGRES_USER}&p=${POSTGRES_PASS}&d=${POSTGRES_DB}"
    image: "nocodb/nocodb:latest"
    ports:
      - "${PUBLIC_PORT}:8080"
    restart: always
    volumes:
      - type: bind
        source: ${VOLUME_DATA_DIR}/nocodb/data
        target: /usr/app/data
        read_only: false
    labels:
      tsdproxy.enable: "true"
      tsdproxy.name: "nocodb"
      tsdproxy.container_port: ${PUBLIC_PORT}
  root_db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      interval: 10s
      retries: 10
      test: 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"'
      timeout: 2s
    image: postgres:16.6
    restart: always
    volumes:
      - type: bind
        source: ${VOLUME_DATA_DIR}/nocodb/db
        target: /var/lib/postgresql/data
        read_only: false
