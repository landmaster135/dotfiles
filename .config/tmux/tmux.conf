set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -s escape-time 50
set -g default-shell "${SHELL}"
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

setw -g status-style fg="colour15",bg="colour30"
set -g status-left-style fg="colour15",bg="colour30"
set -g status-right-style fg="colour15",bg="colour30"

set -g mouse on
setw -g window-status-style fg="colour0",bg="colour154"
setw -g window-status-current-style fg="colour248",bg="colour165"
setw -g window-status-separator "  "

setw -g mode-style fg="colour248",bg="colour165"

set -g pane-border-style fg="colour248"
set -g pane-active-border-style fg="colour165"

set -g window-style 'bg=colour237'
set -g window-active-style 'bg=terminal'
